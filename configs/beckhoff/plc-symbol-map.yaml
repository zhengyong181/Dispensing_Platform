# Beckhoff PLC 变量清单
# 维护说明：
# 1. 本文件给现场调试和上位机开发共同使用，用来说明 HAL 当前依赖哪些 PLC 变量。
# 2. PLC 变量改名、移动、删除或新增时，请同步修改本文件和 src/Hal/DispensingPlatform.Hal.Beckhoff/PlcVariables 下的变量映射代码。
# 3. unit 表示上位机理解的工程单位；plcType 表示 PLC 侧变量类型；direction 表示 HAL 视角下的读写方向。

metadata:
  project: DispensingPlatform.Hal.Beckhoff
  plcProject: PlcPrograme260424
  sourceFolder: 新建文件夹 (2)
  defaultAmsNetId: 192.168.1.50.1.1
  defaultAmsPort: 851
  lastUpdated: 2026-05-25

axes:
  axisCatalog:
    - axisNo: 1
      axisId: Axis1
      name: 喷涂X轴
      kind: 直线轴
    - axisNo: 2
      axisId: Axis2
      name: 喷涂Y轴
      kind: 直线轴
    - axisNo: 3
      axisId: Axis3
      name: 喷涂R轴
      kind: 旋转轴
    - axisNo: 4
      axisId: Axis4
      name: 喷涂Z1轴
      kind: 直线轴
    - axisNo: 5
      axisId: Axis5
      name: 喷涂Z2轴
      kind: 直线轴
    - axisNo: 6
      axisId: Axis6
      name: 顶pin轴
      kind: 直线轴
    - axisNo: 7
      axisId: Axis7
      name: R1轴
      kind: 直线轴
    - axisNo: 8
      axisId: Axis8
      name: R2轴
      kind: 直线轴
    - axisNo: 9
      axisId: Axis9
      name: R3轴
      kind: 直线轴
    - axisNo: 10
      axisId: Axis10
      name: 顶升轴
      kind: 直线轴

  commonSymbols:
    - key: axis.control.powerOn
      symbolTemplate: Com_GVLS.arstAxis[{axisNo}].Control.bPowerOn
      plcType: BOOL
      direction: 写入
      comment: 轴伺服使能命令
    - key: axis.control.homeAuto
      symbolTemplate: Com_GVLS.arstAxis[{axisNo}].Control.bHome_A
      plcType: BOOL
      direction: 脉冲写入
      comment: 自动回零触发位
    - key: axis.control.stopAuto
      symbolTemplate: Com_GVLS.arstAxis[{axisNo}].Control.bStop_A
      plcType: BOOL
      direction: 脉冲写入
      comment: 自动停止触发位
    - key: axis.control.resetAuto
      symbolTemplate: Com_GVLS.arstAxis[{axisNo}].Control.bReset_A
      plcType: BOOL
      direction: 脉冲写入
      comment: 自动复位触发位
    - key: axis.position.relativeEnable
      symbolTemplate: Com_GVLS.arstAxis[{axisNo}].Pos.Par.bRelEnable
      plcType: BOOL
      direction: 写入
      comment: false 表示绝对定位，true 表示相对定位
    - key: axis.position.target
      symbolTemplate: Com_GVLS.arstAxis[{axisNo}].Pos.Par.rPos
      plcType: REAL
      unit: 直线轴=mm，旋转轴=deg
      direction: 写入
      comment: 定位目标位置
    - key: axis.position.velocity
      symbolTemplate: Com_GVLS.arstAxis[{axisNo}].Pos.Par.rVel
      plcType: REAL
      unit: 直线轴=mm/s，旋转轴=deg/s
      direction: 写入
      comment: 定位速度
    - key: axis.position.acceleration
      symbolTemplate: Com_GVLS.arstAxis[{axisNo}].Pos.Par.rAcc
      plcType: REAL
      unit: 直线轴=mm/s^2，旋转轴=deg/s^2
      direction: 写入
      comment: 定位加速度
    - key: axis.position.deceleration
      symbolTemplate: Com_GVLS.arstAxis[{axisNo}].Pos.Par.rDec
      plcType: REAL
      unit: 直线轴=mm/s^2，旋转轴=deg/s^2
      direction: 写入
      comment: 定位减速度
    - key: axis.position.jerk
      symbolTemplate: Com_GVLS.arstAxis[{axisNo}].Pos.Par.rJerk
      plcType: REAL
      unit: 直线轴=mm/s^3，旋转轴=deg/s^3
      direction: 写入
      comment: 定位跃度
    - key: axis.position.goCondition
      symbolTemplate: Com_GVLS.arstAxis[{axisNo}].Pos.Ctrl.bGo_Con
      plcType: BOOL
      direction: 写入
      comment: 定位条件位
    - key: axis.position.goAuto
      symbolTemplate: Com_GVLS.arstAxis[{axisNo}].Pos.Ctrl.bGo_A
      plcType: BOOL
      direction: 脉冲写入
      comment: 自动定位启动触发位
    - key: axis.state.powerOk
      symbolTemplate: Com_GVLS.arstAxis[{axisNo}].State.bPowerOK
      plcType: BOOL
      direction: 读取
      comment: 轴使能完成
    - key: axis.state.homeOk
      symbolTemplate: Com_GVLS.arstAxis[{axisNo}].State.bHome_OK
      plcType: BOOL
      direction: 读取
      comment: 轴回零完成
    - key: axis.state.moving
      symbolTemplate: Com_GVLS.arstAxis[{axisNo}].State.bMoving
      plcType: BOOL
      direction: 读取
      comment: 轴正在移动
    - key: axis.state.hasJob
      symbolTemplate: Com_GVLS.arstAxis[{axisNo}].State.bHasJob
      plcType: BOOL
      direction: 读取
      comment: 轴存在运动任务
    - key: axis.state.error
      symbolTemplate: Com_GVLS.arstAxis[{axisNo}].State.bError
      plcType: BOOL
      direction: 读取
      comment: 轴错误标志
    - key: axis.state.warning
      symbolTemplate: Com_GVLS.arstAxis[{axisNo}].State.bWarning
      plcType: BOOL
      direction: 读取
      comment: 轴警告标志
    - key: axis.state.ncErrorId
      symbolTemplate: Com_GVLS.arstAxis[{axisNo}].State.udiNCErrorID
      plcType: UDINT
      direction: 读取
      comment: NC 错误码
    - key: axis.state.driveErrorCode
      symbolTemplate: Com_GVLS.arstAxis[{axisNo}].State.uiDriveErrorCode
      plcType: UINT
      direction: 读取
      comment: 驱动器报警代码
    - key: axis.state.linearActualPosition
      symbolTemplate: Com_GVLS.arstAxis[{axisNo}].State.rActPos
      plcType: REAL
      unit: mm
      direction: 读取
      comment: 直线轴实际位置
    - key: axis.state.rotaryActualPosition
      symbolTemplate: Com_GVLS.arstAxis[{axisNo}].State.rActModuloPos
      plcType: REAL
      unit: deg
      direction: 读取
      comment: 旋转轴实际模位置，仅 3 轴使用
    - key: axis.state.actualVelocity
      symbolTemplate: Com_GVLS.arstAxis[{axisNo}].State.rActVel
      plcType: REAL
      unit: 直线轴=mm/s，旋转轴=deg/s
      direction: 读取
      comment: 轴实际速度

